name: Dependency Check

on:
  # Run on schedule
  schedule:
    # Run every day at 2 AM UTC
    - cron: "0 2 * * *"
  # Run on push to main
  push:
    branches: [main]
  # Run on pull requests
  pull_request:
    branches: [main, feature/**, fix/**, hotfix/**]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --audit-level=moderate --json > audit-results.json || true
          echo "audit_result=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Display audit results
        run: |
          if [ -f audit-results.json ]; then
            echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat audit-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-results.json
          retention-days: 30

  outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          npm outdated --json > outdated.json || true
          echo "has_outdated=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Display outdated packages
        run: |
          if [ -f outdated.json ]; then
            echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat outdated.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload outdated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outdated-dependencies
          path: outdated.json
          retention-days: 30

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install license checker
        run: npm install -g license-checker

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          license-checker --production --json > licenses.json
          license-checker --production --summary

      - name: Display license summary
        run: |
          echo "## License Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          license-checker --production --summary >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for incompatible licenses
        run: |
          # Fail if GPL, AGPL, or other copyleft licenses are found
          if grep -E "GPL|AGPL|LGPL" licenses.json; then
            echo "⚠️ Warning: Copyleft licenses detected"
            echo "Please review licenses.json for compatibility"
          fi
        continue-on-error: true

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 90

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  notify:
    name: Notify on Critical Issues
    runs-on: ubuntu-latest
    needs: [audit, outdated, license-check]
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Create issue for security vulnerabilities
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Security Vulnerability Detected';
            const body = `A scheduled dependency audit has detected security vulnerabilities.

            **Check Details:**
            - Workflow: ${context.workflow}
            - Run: ${context.runNumber}
            - URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Please review the audit results and update dependencies accordingly.`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'dependencies', 'automated']
            });
