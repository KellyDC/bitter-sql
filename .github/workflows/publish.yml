name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., latest, beta, next)"
        required: false
        default: "latest"
      dry-run:
        description: "Perform a dry run (no actual publish)"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Build and Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: |
          npm pack --dry-run
          echo "## Package Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm pack --dry-run >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Dry run publish (if enabled)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            npm publish --tag ${{ github.event.inputs.tag }} --provenance --access public
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create package summary
        if: success()
        run: |
          echo "## ✅ Successfully Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** bitter-sql@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** https://www.npmjs.com/package/bitter-sql" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "npm install bitter-sql@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create Git tag (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  verify-publication:
    name: Verify npm Publication
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event.inputs.dry-run != 'true' }}

    steps:
      - name: Wait for npm registry update
        run: sleep 30

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get published version
        id: published
        run: |
          VERSION=$(npm view bitter-sql version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Test installation
        run: |
          mkdir test-install
          cd test-install
          npm init -y
          npm install bitter-sql@${{ steps.published.outputs.version }}

          # Test CLI
          npx bitter-sql --version

          # Test as library
          node -e "const { createScaffoldDatabase } = require('bitter-sql'); console.log('✅ Library import successful')"

      - name: Verification summary
        run: |
          echo "## ✅ Publication Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully installed and tested bitter-sql@${{ steps.published.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- CLI execution: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Library import: ✅" >> $GITHUB_STEP_SUMMARY

  create-github-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: verify-publication
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run != 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          # Extract changelog for current version
          VERSION="${{ steps.version.outputs.version }}"
          sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d' > release-notes.md || echo "No changelog found" > release-notes.md

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
